<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 일반적으로 absolute를 쓸 경우 기준이 되는 부모의 position은 relative이다 */
        .outBox{
            position: relative;
            width: 300px;
            height: 200px;
            background-color: rgb(255, 255, 255);
            margin: 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            
            .inBox{
            width: 100px;
            height: 100px;
            
            }

            .box1{
            background-color: rgb(209, 20, 52);  
            position: absolute;
            left: 100px;
            top: 0px;
            /* transform: translate(-50%, -50%); */
            }

            .box2{
            background-color: rgb(58, 25, 243);  
            position: relative;
            left: -50px;
            top: 60px;
            }

            }

           .title{
            text-align: center;
            margin-top: 10px;
            }

    </style>
</head>
<body>
    <h2 class="title">relative 이동 (공간 유지됨)</h2>
    <div class="outBox">

        <div class="inBox box1"></div>
        <div class="inBox box2"></div>
    </div>
    
</body>
</html>
