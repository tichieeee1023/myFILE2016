<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outBox{
            display: flex;
            justify-content: space-evenly;
            align-content: center;
            width: 900px;
            height: 150px;
            border: 1px solid black;
        }

        .inBox{
            width: 100px;
            height: 100px;
            background-color: #333;
            color: aliceblue;
            text-align: center;
            line-height: 100px;
            border-radius: 10px;
        }


    </style>
</head>
<body>
    <!-- class는 반복을 허락한다, 그래서 css에서는 class를 주로 쓴다 -->
     <!-- id는 나 혼자만 사용하는 것, 자바스크립트에서는 id를 주로 쓴다 -->

    <div class="outBox" id="outBox"> </div>
    <script>
        let outBox = document.getElementById("outBox")     
        let num = Number(prompt("몇 개 만들까요?"))
        for(let i=1; i<=num; i++){
            outBox.innerHTML = outBox.innerHTML + "<div class='inBox'> box"+i+"</div>"
                // i = 2 일 때: "1번 박스" + "2번 박스" → outBox 안에 들어감
        }         
    </script>

</body>
</html>
