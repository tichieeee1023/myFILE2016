<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>260410 test</title>
    <style>
        h2{
            color: rgba(29, 87, 79, 0.582);
            font-size: 50px;
            text-align: center;
           
        }
        div{
             width: 400px;
             height: auto;
             font-weight: bold;
             font-size: 30px;
             color: aliceblue;
            background-color: #1a4f44;
             text-align: center;
             line-height: 100px;
             margin: 0 auto;
        }

    </style>
</head>
<body>
    <h2>사칙연산 칠판</h2>
    

    <div id="plus">여기에 두 수의 합을 표시합니다</div>
    <div id="minus">여기에 두 수의 빼기를 표시합니다</div>
    <div id="mul">여기에 두 수의 곱하기를 표시합니다</div>
    <div id="nanugi">여기에 두 수의 나누기를 표시합니다</div>
    
    <script>
    let Num1 = Number(prompt("첫번째 숫자를 입력해주세요"));
    let Num2 = Number(prompt("두번째 숫자를 입력해주세요"));

    let plus = document.getElementById("plus");
    let minus = document.getElementById("minus");
    let mul = document.getElementById("mul");
    let nanugi = document.getElementById("nanugi");
   
plus.innerHTML = `${Num1} + ${Num2} = ${Num1 + Num2}`;

minus.innerHTML = 
        Num1 + " - " + Num2 + " = " + (Num1 - Num2);

mul.innerHTML = 
        Num1 + " * " + Num2 + " = " + (Num1 * Num2);

nanugi.innerHTML = 
        Num1 + " / " + Num2 + " = " + (Num1 / Num2);

    </script>
</body>
</html>
