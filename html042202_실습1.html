<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}
        .outBox{
            position: relative;
            width: 700px;
            height: 280px;
            background-image: url('./img/sea.png');
            background-position: center;
            background-repeat: no-repeat;
            margin: 0px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            
            .inBox{
            width: 700px;
            height: 300px;
            left: 50px;
            
            }

            .box1{
            position: absolute;
            top: 50px;
            color: white;
            text-align: left;
            font-size: 15px;
            }

            .box2{
            position: absolute;
            top: 90px;
            color: white;
            font-weight: 500;
            text-align: left;
            font-size: 28px;
            }
       }

    </style>
</head>
<body>
    <div class="outBox">
        <div class="inBox box1">웃는땅콩 알따리움 어린이집은</div>
        <div class="inBox box2">NC에서<br/>직영으로 운영하는<br/>직장 어린이집이다</div>
    </div>
    
</body>
</html>
