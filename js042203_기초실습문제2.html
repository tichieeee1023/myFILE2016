<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기초실습문제 2</title>
</head>
<body>
    <script>
        // 기초실습문제 2
        let num1 = Number(prompt("첫번째 숫자를 입력해주세요"));
        let num2 = Number(prompt("두번째 숫자를 입력해주세요"));
        let num3 = Number(prompt("세번째 숫자를 입력해주세요"));
        let num4 = Number(prompt("네번째 숫자를 입력해주세요"));

       document.write(num1 + "X" + num2 + "=" + (num1*num2) + "입니다!" + "<br/>")
       document.write(num3 + "+" + num4 + "=" + (num3+num4) + "입니다!" + "<br/>")
       
    </script>
</body>
</html>
