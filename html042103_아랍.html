<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아랍 국기 만들기</title>
    <style>
        *{margin: 0; padding: 0;}

        .outbox{
            width: 400px;
            height: 200px;
            background-color: #FF0000;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .inBox1 {
            position: absolute;
            width: 75%;
            height: 33.33%;
            right: 0;
            top: 0;
            background-color:#00732F;
        }

        .inBox2 {
            position: absolute;
            width: 75%;
            height: 33.33%;
            top: 33.33%;
            right: 0;
            background-color:#ffffff;
        }

        .inBox3 {
            position: absolute;
            width: 75%;
            height: 33.4%;
            right: 0;
            top: 66.66%;
            background-color:#000000;
        }
    </style>
</head>
<body>
    <div class="outbox">
        <div class="inBox1"></div>
        <div class="inBox2"></div>
        <div class="inBox3"></div>
        </div>
    </div>
</body>
</html>
