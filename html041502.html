<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습</title>
    <style>
        .main{

            /* flex는 무조건 자식들을 가로로 세운다! */

            display: flex;
            justify-content: center;
            /* 가로로 가운데 가도록 하는 애 */

            align-items: center;

            flex-direction: column; 
            /* 자식들을 세로로 정렬하겠다 */

            gap: 5px;

            background-color: rgb(228, 231, 233);
            border: 1px solid rgb(216, 216, 218);
            border-radius: 10px;
            width: 350px;
            height: 150px;
            line-height: 70px;
            margin: 0 auto;
            box-shadow: -2px 3px 4px rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 22px;
            font-weight: bold;  
        }

         .btn{
            background-color: rgb(231, 21, 21);
            border: 1px solid rgb(221, 24, 24);
            border-radius: 5px;
            width: 70px;
            height: 30px;
            text-align: center;
            line-height: 30px;

            /* margin: 0 auto; */
            /* margin-top: 15px; */
            /* 위의 display: flex 을 써서 얘는 소용 없어졌다! */

            font-size: 20px;
            font-weight: lighter;
            color: rgb(255, 254, 253);
        
        }

    </style>
</head>
<body>
    <div class="main">
        Important Message!
        <div class="btn">
           Close 
        </div>
    </div>
</body>
</html>
