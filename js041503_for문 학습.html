<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 반복문 : for
        // for (초기값; 종료값; 증가값;){
        // 반복할 내용
        // }

        // 자바스크립트를 포함한 대부분의 언어에서 for문의 표준 형식이 i++이다

        // for문은 "규칙적으로 변하는 값들을 생성하고 처리하는 도구"다
        // 데이터를 다루는 모든 자동화 과정의 엔진이다
        // 자바스크립트를 포함한 대부분의 언어에서 데이터를 담는 칸(리스트)의 번호는 0번부터 시작한다
        // 그래서 let i = 0으로 시작하는 것이 "첫 번째 데이터부터 처리하겠다"는 가장 자연스러운 선언이 된다

        // 초기값의 개념 (i = 0): "자, 일단 아무것도 없는 상태(0)에서 시작하자."
        // i = 0: "데이터의 첫 번째 칸(아무것도 없는 상태의 시작)부터 잡겠다"는 약속. i는 번호(Index)이다.

        // (sum + i)

        let num = Number(prompt ("숫자를 입력해주세요"))    
        let sum = 0;
        // 0부터 입력받은 숫자까지의 총합을 구하라
        
        for(let i=0; i<=num; i++){
            sum = sum + i
        }
        //  document.write는 for 밖으로 뽑아야한다
        
        document.write(sum)

        
    </script>
</body>
</html>
