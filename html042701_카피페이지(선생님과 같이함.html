<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
    *{margin: 0; padding: 0;}

    .topBox{
            position: fixed;
            /* 상단바 절대 고정! */

            width: 100%;
            height: 50px;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .logoBox{
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: start;
            align-items: center;
            
          }

           .logoBox img{
            width: 120px;
            object-fit: contain;
            /* 이미지 css에는 반드시 오브젝트핏을 꼭 넣어야한다! */
            margin-left: 30px;
            /* 이미지 객체는 어미태그에 패딩이 아니라, 이미지 자체에 마진을 넣는게 실무 */
           }

        .menuBox{
            width: 50%;
            height: 100%;
            color: ghostwhite;
            display: flex;
            justify-content: center;
            align-items: center;
            gap:25px
        }
           .menuBox .orange{
            color: orangered;
           }

        .korBox{
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: end;
            align-items: center;
            padding-right: 20px;
            color: aliceblue;
            font-size: 15px;
        }

    .mainImgBox{
        width: 100%;
        position: relative;
        height: 300px;
        background-color: rgb(160, 159, 156);
        background-image: url('./img/main_img.jpeg');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        /* 백그라운드 이미지를 쓸 때 반드시 넣어야하는 세트! */
        }

        .textBox{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            /* 탑 50%을 줬으니, 반드시 트렌스폼 Y를 줘야한다! */
            width: 100%;
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

          .textBox .orange{
            color: orangered;
            font-size: 20px;
          }

            .textBox .white{
            color: rgb(255, 255, 255);
            font-size: 25px;
          }

       .subMenuBox{
        width: 70%;
        height: 40px;
        background-color: rgba(255, 255, 255, 0.507);
        position: absolute;
        left: 50%; bottom: 10px;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
    }
        
        .subMenuBox div{
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .subMenuBox .orange2{
            background-color: coral;
        }

       .ball{
        position: fixed;
        right: 20px;
        bottom: 20px;
        background-color: coral;
        color: rgb(252, 251, 250);
        border-radius: 50%;
        z-index: 10;
       }

    </style>
</head>
<body>
    <!-- 제일 상단 블랙박스 -->
    <div class="topBox">
        <div class="logoBox">
            <img src="./img/logo.png" alt="logo" />
        </div>
        <div class="menuBox">
            <div class="orange">menu1</div>
            <div>menu2</div>
            <div>menu3</div>
            <div>menu4</div>
            <div>menu5</div>
            <div>menu6</div>

        </div>
        <div class="korBox">kor</div>

    </div>
    <!-- 상단 블랙박스 끝 -->

    <!-- 메인 이미지 박스 시작 -->
     <div>
        <div class="mainImgBox">
            <div class="textBox">
                <h2 class="orange">STK 2026</h2>
                <h2 class="white">참가안내</h2>
            </div>
            <div class="subMenuBox">
            <div class="orange2"> SubMenu1</div>
            <div>SubMenu2</div>
            <div>SubMenu3</div>
            <div>SubMenu4</div>
            </div>

     </div>
         <!-- 메인 이미지 박스 끝 -->

     <div class="ball"> ball </div>
</body>
</html>
