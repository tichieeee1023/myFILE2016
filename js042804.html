<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>

    <style>

           .Box{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
           }

           .outBox{
            width: 100px;
            height: 100px;
            border: 1px solid transparent;
            background-color: rgb(240, 229, 229);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

           }

    </style>
</head>
<body>


     <div class="Box">
     <div class="outBox num1" data-number="10">10</div>
     <div class="outBox num1" data-number="+">+</div>
     <div class="outBox num1" data-number="20">20</div>
     </div> 

     <button id="btn">=</button>
     <div id ="dis">결과가 여기 나옵니다</div>

    <script>

       let nums = document.querySelectorAll(".num1")
       let btn = document.querySelector("#btn")
       let dis = document.querySelector("#dis")

       let imsi = ''

        nums.forEach(function(item){
            item.addEventListener("click", function(){
                imsi += item.dataset.number;
               dis.innerHTML += item.dataset.number;
        })
        })

       btn.onclick = function(){
        let result = eval(dis.innerHTML);
        dis.innerHTML = result;

        }
      
    </script>

</body>
</html>
