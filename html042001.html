<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=East+Sea+Dokdo&family=Gowun+Dodum&family=Song+Myung&display=swap" rel="stylesheet">
    <style>
        body{
          background-color: rgb(242, 246, 248);
          
        }
        .main{
            color: darkblue;
            text-align: center;
            margin-top: 50px;
            font-family: "Song Myung", sans-serif;
            /* 2번째 sans-serif : 내 글꼴 중에 고딕체로 인지되는걸 후보로 잡아라 ex 맑은고딕 */
        }

        .box{
            width: 520px;
            height: 70px;
            border: 1px solid black;
            border-radius: 10px;
            padding: 35px;
            font-size: 19px;
            text-align: left;
            margin-top: 40px;
            background-color: rgb(252, 246, 218);
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
            margin: 0 auto;
            font-family: "Gowun Dodum", sans-serif;
        }

        .box2{
            width: 520px;
            height: 70px;
            border-left: 10px solid rgb(23, 66, 185);
            border-radius: 10px;
            padding: 35px;
            font-size: 50px;
            text-align: center;
            margin-top: 40px;
            background-color: rgb(252, 246, 218);
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
            margin: 0 auto;
            font-family: "Song Myung", sans-serif;

        .gowun-dodum-regular {
        font-family: "Gowun Dodum", sans-serif;
        font-weight: 400;
        font-style: normal;
        }

        .song-myung-regular {
            font-family: "Song Myung", serif;
            font-weight: 400;
            }



    </style>
</head>
<body>
    <h1 class="main">CSS 스타일 연습</h1>
    <div class="box">
        안녕하세요! 이 문장은 다양한 <strong>글자 스타일</strong>, <em>배경 색상</em>, 여백과 테두리를 실습하기 위한 예제입니다.
    </div>
    
    <div class="box2">
        별이 빛나는 밤에는 어떤 어둠도 영원히 지속되지 않는다.
    </div>

</body>
</html>
