<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>계산기</title>

    <style>


 

        #dis{

            width: 350px;

            height: 120px;

            background-color: rgb(194, 221, 231);

            border: 1px solid rgb(185, 205, 212);

            border-radius: 2px;

            font-size: 30px;

           

        }


 

        .outBox{

            display: flex;

            justify-content: center;

            align-items: center;

            display: inline-flex;

            flex-wrap: wrap;

            gap: 17px;

            width: 350px;

            height: 330px;

            background-color: rgb(235, 238, 241);

            border: 1px solid rgb(222, 226, 230);

            border-radius: 2px;

        }


 

        .outBox div{

            width: 50px;

            height: 50px;

            background-color: rgb(219, 227, 235);

            border: 1px solid rgb(207, 214, 221);

            border-radius: 50px;

            display: flex;

            justify-content: center;

            align-items: center;

                       }


 

        .outBox #box1{

            background-color: rgb(206, 209, 212);

            border: 1px solid rgb(193, 199, 204);

        }


 

        .outBox #box2{

            background-color: rgb(189, 203, 218);

            border: 1px solid rgb(183, 193, 204);

        }


 

        .outBox #box3{

            background-color: rgb(198, 214, 231);

            border: 1px solid rgb(205, 212, 219);

        }


 

        .outBox #box4{

            background-color: rgb(161, 175, 190);

            border: 1px solid rgb(183, 193, 204);

        }


 

    </style>

</head>

<body>


 

    <div id="dis">0</div>

    <div class="outBox">

        <div class="box" data-num="1">1</div>

        <div class="box" data-num="2">2</div>

        <div class="box" data-num="3">3</div>

        <div class="box" data-num="4">4</div>

        <div class="box" data-num="5">5</div>

        <div class="box" data-num="6">6</div>

        <div class="box" data-num="7">7</div>

        <div class="box" data-num="8">8</div>

        <div class="box" data-num="9">9</div>

        <div class="box" data-num="0">0</div>


 

        <div class="box" id="box3" data-num="+">+</div>

        <div class="box" id="box3"data-num="-">-</div>

        <div class="box" id="box3"data-num="*">x</div>

        <div class="box" id="box3"data-num="/">/</div>

        <div class="box" id="box4"data-num="=">=</div>

        <div class="box" id="box1" data-num="clear">Clear</div>

        <div class="box" id="box2" data-num="back">back</div>


 

    </div>


 

    <script>

        const boxs = document.querySelectorAll(".box")

        const dis = document.querySelector("#dis")


 

        let expr = '' // 개발자의 계산식 용어


 

        // boxs.forEach(function(){ }) 이걸 줄였다!

           boxs.forEach((item)=>{

            item.addEventListener("click", ()=>{

                let v = item.dataset.num;


 

                if(v=== "clear"){

                    expr = ''

                    dis.innerHTML = '0'

                    return;


 

                }if(v=== "back"){

                expr = expr.slice(0, -1);

                dis.innerHTML = expr === '' ? 0 : expr

                return;


 

                }if (v === "=") {

                    if (expr === '' || expr.endsWith("+")) {

                        dis.innerHTML = 'error'

                        expr = ''


 

                     } else if (expr === '' || expr.endsWith("-")) {

                        dis.innerHTML = 'error'

                        expr = ''

                    } else if (expr === '' || expr.endsWith("*")) {

                        dis.innerHTML = 'error'

                        expr = ''


 

                    } else if (expr === '' || expr.endsWith("/")) {

                        dis.innerHTML = 'error'

                        expr = ''


 

                    } else {

                        let ans = eval(expr)

                        dis.innerHTML = Number(ans).toLocaleString();

                        expr = String(ans)

                    }

                    return;

                }

       

                 expr += v

                 dis.innerHTML = expr;

     })

        })


 

    </script>

</body>

</html>
