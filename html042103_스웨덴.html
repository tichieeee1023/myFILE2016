<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스웨덴 국기 만들기</title>
    <style>
        .main{
        width: 320px;
        height: 200px;
        background-color: #006AA7;
        position: absolute;
        top:50%;
        left:50%;
        transform: translate(-50%, -50%); 
         }

        .box{
        position: absolute;
        background-color: #FECC00;
        }

        .line1{
          width: 100%;
          height: 40px;
          top: 50%;
          position: absolute;
          transform: translateY(-50%);
          }

        .line2{
        width: 40px;
        height: 100%;
        left: 100px;
        transform: translateX(-35%);
         }
    </style>
</head>
<body>
    <div class="main">
  <div class="box line1"></div>
  <div class="box line2"></div>
</div>
    
</body>
</html>
