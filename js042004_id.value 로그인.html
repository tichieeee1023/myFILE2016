<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>
<body>
   <label for="id">아이디 : </label><input id="id" type="text" placeholder="아이디 입력" />
   <label for="pass">비밀번호 : </label><input id="pass" type="password" placeholder="비밀번호 입력" />
   <button id="btn">로그인</button>
   <div class="ans" id="ans"></div>

   <script>
    let id = document.getElementById("id")
    let pass = document.getElementById("pass")
    let btn = document.getElementById("btn")
    let ans = document.getElementById("ans")

    btn.onclick = function(){

        if(pass.value == "hello"){
            ans.innerHTML = "<strong>" + id.value+"</strong>" + "님 "+"로그인에 성공했습니다!"
        }else{
            ans.innerHTML ="로그인에 실패했습니다, 패스워드를 다시 입력해주세요"
        }

        }
   </script>
</body>
</html>
