<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let oddsum = [3, 9 , 5 , 7 , 11];
        let max = oddsum[0];
        // 일단 맨 앞의 학생(3)이 가장 크다고 생각한다

        for(let i=0; i < oddsum.length; i++){

            // oddsum.length : oddsum의 배열(데이터)의 갯수
            // oddsum = [3, 9, 5, 7, 11] 일 때, oddsum.length는 5
            // 즉, for(let i=0; i < 5; i++) 라고 쓴 것과 같다

            if(oddsum[i]>max){
               max = oddsum[i]
            }
        }

        document.write(oddsum + " 중 가장 큰 값은 : " + max);

        
    </script>
</body>
</html>
