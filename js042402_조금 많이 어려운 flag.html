<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // num1과 num2에서 공통적인 숫자는 제외한 배열을 출력하라
        let num1 = [1,3,8,7,4]
        let num2 = [2,4,6,8,10]


for (let i = 0; i < num1.length; i++) { // [이야기 시작] 주인공 '1(num1[0])' 입장!
    
    let flag = true; // [전제 조건] 이 주인공은 일단 '무죄'라고 가정하자.

    for (let j = 0; j < num2.length; j++) { // [세부 조사 시작]
        if (num1[i] === num2[j]) { 
            flag = false; // "어? 증거 발견! 유죄(false)로 바꿔!"
        }
    }

    // [마무리] 조사가 다 끝났는데도 여전히 무죄(true)니?
    if (flag == true) {
        com.push(num1[i]); // 그럼 석방(com 바구니에 담기)!
    }
} // [1번 문단 끝] 다음 주인공 '3' 입장... (반복)

        document.write(`num1배열과 num2배열의 공통 숫자를 제외한 숫자는 ${com}`);

    </script>
    
</body>
</html>
