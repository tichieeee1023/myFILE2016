<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체스판 만들기</title>
    <style>
    
        .outBox{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            /* 다음줄로 넘어가! */

            padding: 15px;
            gap: 5px;
            width: 550px;
            text-align: center;
            line-height: auto;
                       
        }

        .inBox{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border-radius: 5px;
        }

        .black{
           background-color: rgb(0, 0, 0);
           color: white;

          }

         .white{
           background-color: rgb(255, 255, 255);
           color: black;
           border: 1px solid rgb(175, 175, 177);
        }
        

    </style>
</head>
<body>
    <div class="outBox" id="outBox">
        
    </div>

    <script>
        let outBox = document.getElementById("outBox")

        for(let i=1; i<=25; i++){
            if(i%2 ==0){
            outBox.innerHTML += "<div class='inBox black'>box"+i+"</div>"

            }else{
            outBox.innerHTML += "<div class='inBox white'>box"+i+"</div>"
            }

        
        }

    </script>
</body>
</html>
