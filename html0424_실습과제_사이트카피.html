<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

 <style>
    *{margin: 0; padding: 0;}

    /* 제일 상단 블랙박스*/

    .topBox{
            position: fixed;
            /* 상단바 절대 고정! */

            width: 100%;
            height: 70px;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .logoBox{
            width: 20%;
            height: 100%;
            display: flex;
            justify-content: start;
            align-items: center;
            
          }

           .logoBox img{
            width: 120px;
            object-fit: contain;
            /* 이미지 css에는 반드시 오브젝트핏을 꼭 넣어야한다! */
            margin-left: 30px;
            /* 이미지 객체는 어미태그에 패딩이 아니라, 이미지 자체에 마진을 넣는게 실무 */
           }

    /* 상단 메뉴박스 */

        .menuBox{
            width: 60%;
            height: 100%;
            font-size: 17px;
            font-weight: 700;
            color: ghostwhite;
            display: flex;
            justify-content: center;
            align-items: center;
            gap:50px;
        }
           .menuBox .orange{
            color: orangered;
           }

        .korBox{
            width: 20%;
            height: 100%;
            display: flex;
            justify-content: end;
            align-items: center;
            padding-right: 50px;
            color: rgb(197, 200, 202);
            font-size: 19px;
        }

        .korBox .semo{
            font-size: 10px;
        }

    .mainImgBox{
        width: 100%;
        position: relative;
        height: 400px;
        background-color: rgb(160, 159, 156);
        background-image: url('./img/main_img.jpeg');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        /* 백그라운드 이미지를 쓸 때 반드시 넣어야하는 세트! */
        }

        .textBox{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            /* 탑 50%을 줬으니, 반드시 트렌스폼 Y를 줘야한다! */
            width: 100%;
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

          .textBox .orange{
            color: rgb(218, 101, 59);
            font-size: 22px;
          }

            .textBox .white{
            color: rgb(255, 255, 255);
            font-size: 40px;
            margin: 0;
            padding: 0;
          }

       .subMenuBox{
        width: 80%;
        height: 40px;
        color: #ddd;
        background-color: rgba(255, 255, 255, 0.507);
        position: absolute;
        left: 50%; bottom: 1px;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
    }
        
        .subMenuBox div{
            width: 25%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .subMenuBox .orange2{
            background-color: coral;
        }

      /* 침가신청 절차 글씨 */

        .section-title1{
        display: flex;
        flex-direction: left;
        justify-content: flex-start;
        align-items:center;
        text-align: left;
        color: rgb(0, 0, 0);
        font-weight: bold;
        font-size: 30px;
        padding: 5px 10px;
        margin-top: 20px;
        margin-bottom: 20px;
        margin-left: 100px;
        
    }

    .section-title2{
    display: flex;
    flex-direction: left;
    justify-content: flex-start;
    align-items:center;
    text-align: left;
    color: darkgray;
    font-weight: bold;
    font-size: 19px;
    padding: 5px 10px;
    margin-top: 20px;
    margin-bottom: 20px;
}

       /* 중간 배너 */

.sub_img {
     width: 80%;
     height: 170px;
     background-image: url('./img/banner.jpg');
     background-position: center;
     background-repeat: no-repeat;
     background-size: cover;
     font-size: 23px;
     font-weight: 400;
     color: ghostwhite;
     display: flex;
     justify-content: center;
     align-items: center;
     margin: 0 auto; 
     margin-top: 30px;
     margin-bottom: 50px;
}

.table {
   width: 100%;
   max-width: 1000px;
   margin: 0 auto;
        }


.table-step td {
   background-color: #e86a33;
   color: white;
   padding: 15px;
   font-weight: bold;
   border: 1px solid #fff;
}

.table-text td {
    padding: 30px 10px;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    font-size: 14px;
        }

</style>
</head>

<body>
    <!-- 제일 상단 블랙박스 -->
    <div class="topBox">
        <div class="logoBox">
            <img src="./img/logo.png" alt="logo" />
        </div>
        <div class="menuBox">
            <div class="orange">SKT</div>
            <div>전시회 구성</div>
            <div>참가업체</div>
            <div>참관객</div>
            <div>프로그램</div>
            <div>미디어센터</div>

        </div>
        <div class="korBox">🌐KOR&nbsp;<span class="semo">▼</span></div>

    </div>
    <!-- 상단 블랙박스 끝 -->

    <!-- 메인 이미지 박스 시작 -->
     <div>
        <div class="mainImgBox">
            <div class="textBox">
                <h2 class="orange">스마트테크 코리아</h2>
                <h2 class="white">참가안내</h2>
            </div>
            <div class="subMenuBox">
            <div class="orange2"> 참가안내</div>
            <div>온라인 부스 참가신청</div>
            <div>스폰서쉽 프로그램</div>
            <div>홍보 자료</div>
            </div>

     </div>
         <!-- 메인 이미지 박스 끝 -->
          
            <span class="section-title1">
             참가신청 절차
             <span class="section-title2">
                    Exhibitor Registration Process
                </span></span>

       <div class="sub_img">
            <p>스마트테크 코리아에서 새로운 비즈니스를 시작하세요!</p>
            </div>

            <table class="table">
                <tr class="table-step">
                    <td>STEP 1</td>
                    <td>STEP 2</td>
                    <td>STEP 3</td>
                    <td>STEP 4</td>
                    <td>STEP 5</td>
                </tr>
                <tr class="table-text">
                    <td>기업회원 가입/로그인</td>
                    <td>온라인 참가신청</td>
                    <td>참가신청서 작성 및 제출</td>
                    <td>계약금 20% 납입</td>
                    <td>잔금 납입</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
