<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      
        .button{
            width: 300px;
            height: 70px;
            font-size: 40px;
            font-weight: bold;
            color:#fcf9f9;
            background-color: rgb(255, 209, 226);
            border: 1px solid rgb(224, 216, 221);
            border-radius: 10% 80% 30% 50%px;
            box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.7);
            /* 오른쪽크기 아래크기 번지기 그림자색상 */
            text-align: center;
            line-height: 70px;
        }
    </style>
</head>
<body>
    <div class="button">Click Me!</div>
</body>
</html>
