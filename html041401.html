<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습용01</title>
    <style>
        h1{
            color: #333; 
            font-size: 60px;
            text-align: center;
            text-shadow: #8a7a7a;
        }
        h2{
            color: #d87070; 
            font-size: 40px;
            text-align: center;
        }

        .red{
            color: red;
        }

        .blue{
            color:blue;
        }

        .yellow{
            color: yellow;
        }
        .exe{
            color: rgb(74, 151, 161);
            font-size: 90px;
        }
    </style>
</head>
<body>
   <h1><span class="exe">연습</span>페이지</h1>
   <h2>연습페이지</h2>
  <p class="red">연습페이지1</p>
  <p class="blue">연습페이지2</p>
  <p class="yellow">연습페이지3</p>
</body>
</html>
