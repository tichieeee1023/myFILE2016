<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h2{
            text-align: center;
            color: rgb(40, 43, 85);
            font-size: 25px;
            width: 150px;
            height: 2px;
            background-color: aliceblue;
            margin: 0 auto;
        }

        .line {
                width: 150px;
                background-color: skyblue;
                margin: 0 auto 20px;    
        }

        .displayBox{
            width: 400px;
            border: 1px solid skyblue;
            background-color: rgb(211, 239, 250);
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
        }

        #ages{
            border: none;
            background-color: rgb(238, 245, 242);
            width: 200px;
            height: 30px;
        }

        #ages option{
            background-color: rgb(224, 230, 227);
            width: 200px;
            height: 20px;
        }


    </style>

</head>
<body>

    <h2>회원명단</h2>
    <div class ="line"></div>

    <select id="ages">

        <option value="20"> 20세 이상 </option>
        <option value="30"> 30세 이상 </option>
        <option value="40"> 40세 이상 </option>
    </select>

    <button id="btn"> 확인 </button>



    <div class="displayBox"></div>

    <script>

    let person = [
        {name : "홍길동", age : 20, address : "서울"},
        {name : "이순신", age : 30, address : "전라도"},
        {name : "강감찬", age : 20, address : "충청도"},
        {name : "김유신", age : 50, address : "안산"},
    ]

    let displayBox = document.querySelector(".displayBox");
    let btn = document.querySelector("#btn");
    let ages = document.querySelector("#ages");



    btn.onclick = function(){
        displayBox.innerHTML = ""; 
    person.forEach(function(item, idx){
        if( Number(ages.value) <= item.age){
       // function은 변수를 3개까지 넣을 수 있으나, 그 위치가 중요하다
       displayBox.innerHTML += `${idx+1}번 ${item.name}님 ${item.age}살 <br/>`
    }
    })
}
    </script>
</body>
</html>
