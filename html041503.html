<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습</title>
    <style>
        .box1{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;

            background-color: rgb(199, 223, 211);
            border: 1px solid rgb(213, 214, 211);
            border-radius: 3px;
            width: 590px;
            height: 240px;
            line-height: 70px;
            margin: 0 auto;
            box-shadow: -2px 3px 4px rgba(155, 161, 150, 0.2);
            text-align: center;
            font-size: 35px;
            font-weight:500px;
            margin: 0 auto;
            color: rgb(253, 253, 253);
        }

         .box2{
            background-color: rgb(228, 36, 36);
            border: 1px solid rgb(221, 24, 24);
            border-radius: 2px;
            width: 350px;
            height: 65px;
            text-align: center;
            line-height: 60px;
            font-size: 35px;
            font-weight: bold;
            color: rgb(255, 254, 253);
        
        }

    </style>
</head>
<body>
    <div class="box1">
        AI시대를 살아가는 공부 비법
        <div class="box2">
           이젠컴퓨터아카데미 
        </div>
    </div>
</body>
</html>
