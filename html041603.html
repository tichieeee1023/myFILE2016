<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

    .outBox{
            display: flex;
            justify-content:space-evenly;
            align-items:center;
            gap: 10px;
            width: 800px;
            height: 200px;
            background-color: rgb(255, 255, 255);
            /* transition: all 0.3s; */

    .box1{
        width: 150px;
        height: 150px;
        background-color: rgb(88, 181, 235);


    }

    .box1:hover{
        transform:scale(200%);
        background-color: rgb(58, 162, 223);
        transition: all 0.3s;
    }

    .box2{
        width: 150px;
        height: 150px;
        background-color: darkolivegreen;

    }

    .box2:hover{
        transform:rotate(45deg);
        background-color: rgb(182, 206, 140);
        transition: all 0.3s;
    }

    .box3{
        width: 150px;
        height: 150px;
        background-color: rgb(226, 194, 104);

    }

    .box3:hover{
        transform:translateX(100px);
        background-color: rgb(255, 205, 66);
        transition: all 0.3s;
    }
}


</style>
</head>
    <div class="outBox">

    <!-- <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div> -->

    <!-- 공통 이름인 box 를 지어줌으로서 공통적인 디자인을 제어한다 -->

    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    </div>
</body>
</html>
