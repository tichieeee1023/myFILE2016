<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let mat = []
        // "앞으로 여기에 여러 개의 데이터를 차곡차곡 쌓을 거야" 라고 빈 서랍장을 준비한 것
        // 배열(mat)은 무조건 for문을 사용해 출력을 해야한다


        // i<5 : 숫자 입력창을 i번 띄우게 한다
        // mat[i] : "서랍장의 i번째 칸을 열어서 거기에 입력값을 넣어!"라고 주소를 딱 지정하는 방식

        for(let i=0; i<5; i++){
            mat[i] = Number(prompt("숫자를 입력해주세요"))
        }

        // 출력 따로
        // mat.push(99): "서랍장 맨 마지막에 99라는 칸을 하나 더 덧붙여!"라는 방식

        mat.push(77)
        mat.push(88)
        mat.push(99)
        for(let i=0; i<mat.length; i++){
            document.write(mat[i], "<br/>")
        }

        </script>
</body>
</html>
