<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
<script>

    // 2개의 수를 입력받아 예시와 같이 반복해서 *을 출력되도록 프로그램 구현

    // 별을 몇 개 출력할거야?
    let num1 = Number(prompt("첫번째 숫자를 입력해주세요"));

    // 그래서 몇 층 출력할거야?
    let num2 = Number(prompt("두번째 숫자를 입력해주세요"));

    // 별의 층!
    for(let i=1; i<=num2; i++){

    // 별의 갯수!
        for (let j=1; j<=num1; j++){
         document.write("*");
        }
         document.write("<br/>");
    }
    </script>
</body>
