<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 공통변수에 모든 좌석표 입력해서 출력 a010, a020 ~ d010, d020
        // 힌트 1 같은 숫자는 안 넣기, 힌트2 반복할 땐 같은 것만 체크. 추가는 나중에
        let num1 = ["A", "B", "C", "D"]
        let num2 = ["010", "020", "030", "040"]

        let com = []

        for (let i=0; i<num1.length; i++){
            for (let j=0; j<num1.length; j++){
                com.push(num1[i] + num2[j] + "<br/>")
            }
        }

        document.write(com)


    </script>
    
</body>
</html>
