<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 소괄호()는 함수의 입력이나 계산, 중괄호{}는 조건문, 반복문 등 코드의 실행범위 정의
        // () 는 무엇을 할지, {}는 어떻게 할지
        
        // if : 비교 판단문 (만약에)
        let jumsu = Number(prompt("당신의 점수를 입력하세요"))
        console.log(jumsu)
        // 개발자 창에서만 확인이 가능하다, 프로그램에 영향을 주지 않으며 오로지 내가 확인하는 용도
        // if (조건) {조건이 참일 때} else {조건이 거짓일 때}
        if(jumsu >= 80){
            alert("합격을 축하합니다!")
        }else{
            alert("안타깝네요, 불합격입니다")
        }
        document.write("95점보다 높을시 최우수상 수여")


    </script>
</body>
</html>
