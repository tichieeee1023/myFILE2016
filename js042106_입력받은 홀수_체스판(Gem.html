<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>n*n 홀수 체스판 만들기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .outBox {
            display: inline-flex;
            flex-wrap: wrap;
            padding: 15px;
            gap: 5px;
            background-color: #f0f0f0;
        }
        .inBox {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        .black { background-color: rgb(0, 0, 0); color: white; }
        .white { 
            background-color: rgb(255, 255, 255); 
            color: black; 
            border: 1px solid rgb(175, 175, 177); 
        }
    </style>
</head>
<body>
    <div id="outBox" class="outBox"></div>

    <script>
        let n = Number(prompt("숫자를 입력하세요 (홀수만)"));
        let outBox = document.getElementById("outBox");

        if (n % 2 == 0) {
            alert("홀수만 입력해주세요!");
        } else {
            outBox.style.width = (n * 85 + 30) + "px"; 

            for (let i = 1; i <= (n * n); i++) {
                if (i % 2 == 0) {
                    outBox.innerHTML += "<div class='inBox black'>box" + i + "</div>";
                } else {
                    outBox.innerHTML += "<div class='inBox white'>box" + i + "</div>";
                }
            }
        }
    </script>
</body>
</html>
