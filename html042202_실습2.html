<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습2</title>
    <style>
        *{margin: 0; padding: 0;}

        .outBox{
            position: relative;
            width: 380px;
            height: 380px;
            background-image: url('./img/sake.jpg');
            background-position: center;
            background-repeat: no-repeat;
            margin: 0px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            
            .time{
            position: absolute;
            border: 1px solid rgb(53, 52, 52);
            background-color: rgb(53, 52, 52);
            width: 60px;
            height: 30px;
            right: 10px;
            bottom: 60px;
            color: white;
            text-align: center;
            font-size: 15px;
            }
       }
    </style>
</head>
<body>
    <div class="outBox">
        <div class="time">3:40:27</div>
    </div>
    
</body>
</html>
