<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    </head>
<body>
    <script>

        // 1~10까지 3의 배수만 출력시켜라

        for(let i=1; i<=10; i++){
           
            if(i % 3 == 0)
            if(i == 9){
                // 3의 배수이면서 + 동시에 9여야만 들어오는 곳
            document.write(i)
        }else{
            document.write(i, "+")
        }
    }
        
  
    </script>
</body>
</html>
