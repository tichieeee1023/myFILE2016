<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}

        @font-face {
            font-family: 'myfont';
            src: url(./font/Griun_Mongtori-Rg.ttf);
            font-weight: bold;
        }

        img{
            width: 300px;
            margin: 0 auto;
            object-fit: cover;
            display: block;
            /* display : inlline ; w, h 안 되고, 한줄에 다른 태그가 올 수 있다 */
            /* display: block ; w, h 가능, 한줄에 다른 태그가 올 수 */
         }

        table{
             width: 600px;
             border-collapse: collapse;
             margin: 20px auto;
            
        }

        tr,td{
           border: 1px solid #666;
           padding: 12px;
           text-align: center;
        }

        th{
            padding: 10px;
            border: 1px dashed black;
            text-align: center;
            background-color: rgb(90, 185, 127);
            font-family: 'myfont';
            font-size: 18px;
        }

        .name {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
}

        .lightGreen{
           background-color: rgb(218, 240, 227); 
           font-family: 'myfont';
        }
    

    </style>
</head>
<body>
    <h2 class="name">채소 소개 표</h2>
    <img src="./img/yac.jpg" alt="야채"/>

    <table>
    <tr class="title">
        <th>채소</th>
        <th>특징</th>
    </tr>

 <tr class="lightGreen">
        <td>당근</td>
        <td>비타민 A 풍부</td>
    </tr>

    <tr class="white">
        <td>시금치</td>
        <td>철분과 미네랄 풍부</td>
    </tr>

    <tr class="lightGreen">
        <td> 📦️브로콜리</td>
        <td>항산화 성분 가득</td>
    </tr>

     </table>
    
</body>
</html>
