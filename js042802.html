<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        #dis{
            width: 500px;
            height: 120px;
            background-color: rgb(194, 221, 231);
            border: 1px solid rgb(185, 205, 212);
            border-radius: 2px;
        }

        .outBox{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 500px;
            height: 70px;
            background-color: rgb(235, 238, 241);
            border: 1px solid rgb(222, 226, 230);
            border-radius: 2px;
        }

        .outBox div{
            width: 50px;
            height: 50px;
            background-color: rgb(219, 227, 235);
            border: 1px solid rgb(207, 214, 221);
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
                       }

        .outBox #box1{
            background-color: rgb(206, 209, 212);
            border: 1px solid rgb(193, 199, 204);
        }

        .outBox #box2{
            background-color: rgb(189, 203, 218);
            border: 1px solid rgb(183, 193, 204);
        }

    </style>
</head>
<body>

    <div id="dis">0</div>
    <div class="outBox">
        <div class="box" data-num="1">1</div>
        <div class="box" data-num="+">+</div>
        <div class="box" data-num="-">-</div>
        <div class="box" data-num="2">2</div>
        <div class="box" data-num="=">=</div>
        <div class="box" id="box1" data-num="clear">Clear</div>
        <div class="box" id="box2" data-num="back">back</div>

    </div>

    <script>
        const boxs = document.querySelectorAll(".box")
        const dis = document.querySelector("#dis")

        let expr = '' // 개발자의 계산식 용어

        // boxs.forEach(function(){ }) 이걸 줄였다!
           boxs.forEach((item)=>{
            item.addEventListener("click", ()=>{
                let v = item.dataset.num;

                if(v=== "clear"){
                    expr = ''
                    dis.innerHTML = '0'
                    return;

                }if(v=== "back"){
                expr = expr.slice(0, -1);
                dis.innerHTML = expr === '' ? 0 : expr
                return;

                }if (v === "=") {
                    if (expr === '' || expr.endsWith("+")) {
                        dis.innerHTML = 'error'
                        expr = ''

                     } else (expr === '' || expr.endsWith("-")) {
                        dis.innerHTML = 'error'
                        expr = ''
                    } else {
                        let ans = eval(expr)
                        dis.innerHTML = Number(ans).toLocaleString();
                        expr = String(ans)
                    }
                    return; 
                }
        
                 expr += v

                //  현재 식을 더하기(+) 기호를 기준으로 나눈다
                // parts = '111+2222' split => [111,2222]
                 let parts = expr.split("+")

                 if(parts.length === 1){
                 // 1이라는 건, 아직 더하기(+)를 누르지 않고 "숫자만 쓰고 있다"는 뜻

                dis.innerHTML = Number(parts[0]).toLocaleString()
                // 그 숫자 덩어리를 Number로 바꿔서 
                // 천 단위마다 콤마를 찍어(toLocaleString) 화면에 출력
                 }else{
                    dis.innerHTML = Number(parts[0]).toLocaleString() + "+" + Number(parts[1]).toLocaleString();

               }
     }) //addEventListener 종료
        }) // forEach 종료

    </script>
</body>
</html>
