<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outBox{
            display: flex;
            justify-content:space-evenly;
            align-items:center;
            gap: 10px;
            width: 800x;
            height: 200px;
            background-color: rgb(255, 255, 255);

        
        }

        .round{
            width: 100px;
            height: 100px;
            font-size: 40px;
            background-color: rgb(252, 253, 253);
            border: 1px solid rgb(197, 206, 206);
            box-shadow: -2px 2px 5px rgb(196, 209, 201) 0.3;
            border-radius: 50px 50px 50px 50px;
            text-align: center;
            font-size: 40px;
            color: rgb(87, 126, 113);
            line-height: 100px;
            transition: all 0.3s;
            
        }
        .round:hover{
            background-color: rgb(255, 255, 255);
            box-shadow: 1px 2px 2px 3px rgba(127, 168, 143, 0.2);
            color: rgb(88, 155, 133);
        }


    </style>
</head>
<body>
    <div class="outBox">
      <div class="round">1</div>
      <div class="round">2</div>

      
      <div class="round">3</div>
      <div class="round">4</div>
    </div>
    
</body>
