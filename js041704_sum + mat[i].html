<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let mat = []
        let sum = 0

        for(let i=0; i<3; i++){
            mat[i] = Number(prompt("숫자를 3번 입력해주세요"))
            
        }

        mat.push(55)

        for(let i=0; i<mat.length; i++){
            sum = sum + mat[i]
        }
        
        document.write(sum, "<br/>")

        </script>
</body>
</html>
