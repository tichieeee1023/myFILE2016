<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>260410 test</title>
    <style>
        h2{
            color: rgba(29, 87, 79, 0.582);
            font-size: 50px;
            text-align: center;
           
        }
        div{
             width: 400px;
             height: auto;
             font-weight: bold;
             font-size: 30px;
             color: aliceblue;
            background-color: #1a4f44;
            border-radius: 8px; 
            border: 5px solid #5d4037;
             text-align: center;
             line-height: 100px;
             margin: 0 auto;
        }

    </style>
</head>
<body>
    <h2>사칙연산 칠판</h2>
    

    <div id="box">입력 대기중</div>
    
    <script>
    let Num1 = Number(prompt("첫번째 숫자를 입력해주세요"));
    let Num2 = Number(prompt("두번째 숫자를 입력해주세요"));

    let board = document.getElementById("box");
   
board.innerHTML = 
        Num1 + " + " + Num2 + " = " + (Num1 + Num2) + "<br>" +
        Num1 + " - " + Num2 + " = " + (Num1 - Num2) + "<br>" +
        Num1 + " * " + Num2 + " = " + (Num1 * Num2) + "<br>" +
        Num1 + " / " + Num2 + " = " + (Num1 / Num2);

    </script>
</body>
</html>
