<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    let num1 = [1,2,4,5,7];
    let num2 = [3,5,7,9,11];

    let commonBox = [];

    // num1.lenght => 5

    for(let i=0; i<num1.length; i++){
         for(let j=0; j<num2.length; j++){
            if(num1[i] === num2[j]){
              commonBox.push(num1[i]);
         //commonBox.push에 if(5 === 5) 결과 참(True)이 된 값을 push 해라
            }
    }
}

 document.write(`num1배열과 num2배열의 공통 숫자는 ${commonBox}`);

    </script>
</body>
</html>
