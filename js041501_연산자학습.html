<!DOCTYPE html>
<html lang="kor">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num1 = 40
        let num2 = 20
        let sum = num1 + num2
        document.write("두 수의 합은 " + sum + "입니다. ")

        // +, - , * , / 
        // 자바스크립트라는 언어만 지원하는 연산자 % : 나누어서 몫은 안 챙기고 나머지만 봄
        // num1 % num2
        // num1++(전위), ++num1(후위) : 증감연산자, 단항연산자
        // >== 비교연산자, and(&&), or(||)

        let sum1 = num1++
        document.write(sum1, num1)

    </script>
</body>
</html>
