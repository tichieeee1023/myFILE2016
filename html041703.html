<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>이번주 배운 거 자율학습</title>

    <style>
        .card{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 300px;
            height: 300px;
            border: 1px solid rgb(226, 218, 218);
            border-radius: 50px;
            overflow: hidden;
            background-image: url(https://picsum.photos/seed/picsum/536/354);
            background-size: cover;
        }
        
          .flower{
            width: 100%;
            height: 100%;
            border-radius: 5px;
            box-shadow: 5px;
            object-fit: cover;
            transition: all 0.9s;
          }

          .card .flower:hover{
            transform: translateY(300px);
          }

    </style>
</head>
<body>
        <div class="card">
            <img class="flower" src="https://fastly.picsum.photos/id/37/2000/1333.jpg?hmac=vpYLNsQZwU2szsZc4Uo17cW786vR0GEUVq4icaKopQI" alt="꽃" />
        </div>


    </div>
</body>
</html>
