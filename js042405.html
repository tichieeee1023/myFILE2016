<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // "일단 한 번은 실행해(do)! 그리고 나서 계속할지 말지 조건(while)을 따져봐."
        // 한 번 놀게 해준 다음, 나갈 때 "너 또 놀래?"라고 물어보는 것
        // 괄호 안의 조건이 참(True)인 '동안'은 계속해서 중괄호{ } 안의 내용을 실행하라

        do{
        name = prompt("이름을 입력하세요")
        count++
        document.write(name)
        if(name == "그만"){
            break;
        }
       } while(true)
    //    "참인 동안" (즉, 영원히) 반복해!
    
    </script>
    
</body>
</html>
