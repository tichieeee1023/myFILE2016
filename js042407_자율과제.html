<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let answer = 5;  // 정답 숫자
        let guess;

        do {
        guess = Number(prompt("1부터 10 사이의 숫자를 맞혀보세요"));
        } while (guess !== answer);

        alert("정답입니다!");


    </script>
</body>
</html>
