      .main {

        .whiteBox {
          width: 480px;

          background-position: center;

          top: 5%;

      }

      .mainText {
        position: relative;

        font-size: 20px;
        font-weight: bold;
      }

      .mainimage {

        color: rgb(0, 0, 0);
